services:

  db:
    image: postgres:17

    container_name: nessiye-db1

    restart: unless-stopped

    env_file:
      - ./backend/.env

    environment:
      POSTGRES_DB: nessiye
      POSTGRES_USER: amir
      POSTGRES_PASSWORD: amirkunie1234

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:

    build: ./backend

    container_name: nessiye-backend

    working_dir: /app

    command: python manage.py runserver 0.0.0.0:8000

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app

    ports:
      - "8080:8000"

    depends_on:
      - db

  frontend:

    build: ./frontend

    container_name: nessiye-frontend

    working_dir: /app

    env_file:
      - ./frontend/.env.production

    ports:
      - "3000:3000"

    depends_on:
      - backend

volumes:
  postgres_data: